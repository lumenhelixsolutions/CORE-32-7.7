<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CORE32 Research Demo</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 0; background: #111; color: #eee; }
      main { max-width: 1100px; margin: 0 auto; padding: 32px; }
      .card { background: #1b1b1b; border: 1px solid #333; border-radius: 18px; padding: 20px; box-shadow: 0 12px 40px rgba(0,0,0,.3); }
      input, button { padding: 10px 12px; border-radius: 10px; border: 1px solid #444; background: #222; color: #eee; }
      button { cursor: pointer; font-weight: 700; }
      pre { white-space: pre-wrap; overflow: auto; background: #050505; padding: 16px; border-radius: 14px; }
      progress { width: 100%; height: 18px; }
    </style>
  </head>
  <body>
    <main>
      <h1>CORE32 Research Demo</h1>
      <section class="card">
        <label>Symbol <input id="symbol" value="BTC" /></label>
        <label><input id="synthetic" type="checkbox" checked /> use synthetic data</label>
        <button id="run">Run pipeline</button>
        <p><progress id="progress" max="100" value="0"></progress></p>
        <pre id="output">Ready.</pre>
      </section>
    </main>
    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
